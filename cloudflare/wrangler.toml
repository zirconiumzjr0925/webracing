name = "neon-bend-rush-service"
main = "./worker.js"
compatibility_date = "2026-04-18"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RaceRoom" },
  { name = "LEADERBOARD", class_name = "LeaderboardStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RaceRoom", "LeaderboardStore"]
